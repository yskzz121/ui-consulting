# === 基本情報 ===
company: 半嶺当徹土地家屋調査士事務所
brand: ""
industry: 土地家屋調査士（士業）
representative: 半嶺当徹
area: ""
contract_start: ""
reporting_cycle: monthly
client_id: hanamine

# === データソースの特性 ===
data_sources:
  - type: pdf_trial_balance
    description: 税理士から月次試算表PDF（BS含む）
  - type: meeting_notes
    description: 面談メモ（福原が記載）

# === 分析フレーム ===
analysis_framework:
  # 第1層: 財務分析
  financial:
    always: [売上高, 売上総利益, 固定費合計, 営業利益]
    comparison: [yoy, mom]
    focus_costs: [人件費, 外注費, 車両費]

  # 第2層: 収益性・効率性
  efficiency:
    - 労働分配率
    - ROA
    - ROE

  # 第2層: 業種固有KPI
  industry_kpis:
    - name: 案件数
      unit: 件
    - name: 案件単価
      unit: 万円
    - name: 稼働率
      unit: "%"

  # 第3層: 財務健全性
  balance_sheet:
    available: true       # BS提出あり
    metrics: [流動比率, 自己資本比率]

  # 第4層: キャッシュフロー
  cashflow:
    available: true
    method: simplified

# === 非表示セクション ===
excluded_sections: []

# === 現在の重点テーマ ===
focus_topics: []

# === レポートのトーン ===
report_style:
  audience: ""
  tone: 直接的、改善提案を必ず含める
  length: standard
  language: ja
  notes: ""

# === パスワードロック ===
password_hash: ""
