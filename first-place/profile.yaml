# === 基本情報 ===
company: ファーストプレイス株式会社
brand: 学習塾文殊
industry: 教育（学習塾）
representative: ""
area: 浦添市
contract_start: ""
reporting_cycle: monthly
client_id: first-place

# === データソースの特性 ===
data_sources:
  - type: spreadsheet
    description: GoogleスプレッドシートでPL共有
  - type: meeting_notes
    description: 面談メモ（福原が記載）

# === 分析フレーム ===
analysis_framework:
  # 第1層: 財務分析
  financial:
    always: [売上高, 売上総利益, 固定費合計, 営業利益]
    comparison: [yoy, mom]
    focus_costs: [人件費, 家賃, 広告宣伝費]

  # 第2層: 収益性・効率性
  efficiency:
    - 客数
    - 客単価
    - 労働分配率
    - ROA
    - ROE

  # 第2層: 業種固有KPI
  industry_kpis:
    - name: 生徒数
      unit: 人
    - name: 退塾率
      unit: "%"
      alert_threshold: 5
    - name: コース別生徒数
    - name: 新規入塾数
      unit: 人
    - name: 生徒単価
      unit: 円

  # 第3層: 財務健全性
  balance_sheet:
    available: true       # BS請求により取得可能
    metrics: [流動比率, 自己資本比率]

  # 第4層: キャッシュフロー
  cashflow:
    available: true
    method: simplified

# === 非表示セクション ===
excluded_sections: []

# === 現在の重点テーマ ===
focus_topics: []

# === レポートのトーン ===
report_style:
  audience: ""
  tone: 直接的、改善提案を必ず含める
  length: standard
  language: ja
  notes: 季節変動（春の入塾・受験後の退塾）を考慮し、前年同月比を重視する

# === パスワードロック ===
password_hash: ""
session_key: fp_auth
