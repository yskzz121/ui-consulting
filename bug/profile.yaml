# === 基本情報 ===
company: 株式会社B.U.G
brand: ""
industry: フィットネス（パーソナルジム・12店舗運営）
representative: ""
area: 沖縄県
store_count: 12
contract_start: ""
reporting_cycle: monthly
client_id: bug

# === データソースの特性 ===
data_sources:
  - type: spreadsheet
    description: GoogleスプレッドシートでPL共有
  - type: meeting_notes
    description: 面談メモ（福原が記載）

# === 分析フレーム ===
analysis_framework:
  # 第1層: 財務分析
  financial:
    always: [売上高, 売上総利益, 固定費合計, 営業利益]
    comparison: [yoy, mom]
    focus_costs: [人件費, 家賃, 広告宣伝費]

  # 第2層: 収益性・効率性
  efficiency:
    - 客数
    - 客単価
    - 労働分配率
    - ROA
    - ROE

  # 第2層: 業種固有KPI
  industry_kpis:
    - name: 会員数
      unit: 人
    - name: 退会率
      unit: "%"
      alert_threshold: 5
    - name: 店舗別売上
      unit: 万円
    - name: 1店舗あたり会員数
      unit: 人

  # 第3層: 財務健全性
  balance_sheet:
    available: true       # BS請求により取得可能
    metrics: [流動比率, 自己資本比率]

  # 第4層: キャッシュフロー
  cashflow:
    available: true
    method: simplified

# === 非表示セクション ===
excluded_sections: []

# === 現在の重点テーマ ===
focus_topics: []

# === レポートのトーン ===
report_style:
  audience: ""
  tone: 直接的、改善提案を必ず含める
  length: standard
  language: ja
  notes: 12店舗の店舗別採算比較を必ず含める

# === パスワードロック ===
password_hash: ""
session_key: bug_auth
