# === データソースの特性 ===
data_sources:
  - type: spreadsheet
    description: 現地スタッフがスプレッドシートでPL共有
  - type: meeting_notes
    description: 面談メモ（福原が記載）

# === 分析フレーム ===
analysis_framework:
  # 第1層: 財務分析
  financial:
    always: [売上高, 売上総利益, 固定費合計, 営業利益]
    comparison: [yoy, mom]
    focus_costs: [フードコスト, 人件費, 家賃]
    currency: AUD          # 現地通貨
    secondary_currency: JPY # 換算通貨（併記）

  # 第2層: 収益性・効率性
  efficiency:
    - 客数
    - 客単価
    - ロス率
    - 労働分配率
    - ROA
    - ROE

  # 第2層: 業種固有KPI
  industry_kpis:
    - name: 為替レート
      pair: AUD/JPY
    - name: 現地通貨ベースPL

  # 第3層: 財務健全性
  balance_sheet:
    available: true       # BS請求により取得可能
    metrics: [流動比率, 自己資本比率]

  # 第4層: キャッシュフロー
  cashflow:
    available: true
    method: simplified

