# === 基本情報 ===
company: 株式会社パピーラブ
brand: ""
industry: ペット総合（生体販売・トリミングサロン・ペットホテル・犬繁殖）
representative: ""
area: ""
contract_start: ""
reporting_cycle: monthly
client_id: puppy-love

# === データソースの特性 ===
data_sources:
  - type: pdf_trial_balance
    description: 税理士から月次試算表PDF
  - type: meeting_notes
    description: 面談メモ（福原が記載）

# === 分析フレーム ===
analysis_framework:
  # 第1層: 財務分析
  financial:
    always: [売上高, 売上総利益, 固定費合計, 営業利益]
    comparison: [yoy, mom]
    focus_costs: [仕入原価, 人件費, 家賃]

  # 第2層: 収益性・効率性
  efficiency:
    - 客数
    - 客単価
    - 労働分配率
    - ROA
    - ROE

  # 第2層: 業種固有KPI
  industry_kpis:
    - name: 事業別PL
      segments: [生体販売, トリミングサロン, ペットホテル, 犬繁殖]
    - name: 販売頭数
      unit: 頭
    - name: サロン施術件数
      unit: 件
    - name: ホテル稼働率
      unit: "%"

  # 第3層: 財務健全性
  balance_sheet:
    available: true       # BS請求により取得可能
    metrics: [流動比率, 自己資本比率]

  # 第4層: キャッシュフロー
  cashflow:
    available: true
    method: simplified

# === 非表示セクション ===
excluded_sections: []

# === 現在の重点テーマ ===
focus_topics: []

# === レポートのトーン ===
report_style:
  audience: ""
  tone: 直接的、改善提案を必ず含める
  length: standard
  language: ja
  notes: 事業別（生体販売/サロン/ホテル/繁殖）の採算比較を必ず含める

